name: "CI"

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
  pull_request:

permissions:
  contents: "write"
  pull-requests: "write"
  statuses: "write"
  deployments: "write"

concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:

  build:
    name: "Build status.nixos.org"
    runs-on: "ubuntu-latest"

    if: "!contains(github.event.head_commit.message, '[ci skip]')"

    steps:

      - name: "Checking out the repository"
        uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
        with:
          persist-credentials: false

      - name: "Installing Nix"
        uses: "cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c" # v31.10.7

      - name: "Build"
        run: |
          nix build
          mkdir build
          cp -RL ./result/* ./build/

      - name: "Publish to Netlify"
        if: ${{ github.repository == 'NixOS/nixos-status' }}
        uses: "nwtgck/actions-netlify@d22a32a27c918fe470bbc562e984f80ec48c2668" # v4.0.0
        env:
          NETLIFY_AUTH_TOKEN: "${{ secrets.NETLIFY_AUTH_TOKEN }}"
          NETLIFY_SITE_ID: "${{ secrets.NETLIFY_SITE_ID }}"
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          deploy-message: "Published from GitHub Actions"
          publish-dir: "./build"

          enable-pull-request-comment: true
          overwrites-pull-request-comment: false
          enable-commit-comment: false
          enable-commit-status: true

          production-branch: "main"
          production-deploy: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

          alias: "${{ github.event_name == 'push' && github.ref_name || '' }}"

          enable-github-deployment: ${{ github.event_name == 'push' }}
          github-deployment-environment: "${{ github.event_name == 'push' && github.ref_name || format('pull-request-{0}', github.event.number) }}"
